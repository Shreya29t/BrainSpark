<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainSpark — Login</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body class="login-body">

  <main class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="login-title">Brain<span class="sky">Spark</span></h1>
    <p class="login-subtitle">Smarter learning with AI-powered flashcards and quizzes.</p>

    <!-- Google Login Button -->
    <button id="loginBtn" class="btn-primary login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      ✨ Continue with Google
    </button>

    <p class="login-footer">Continue your learning journey with BrainSpark 🚀</p>
  </main>

  <script src="firebase-config.js"></script>
  <script>
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
        window.location.href = "index.html";
      } catch (e) {
        console.error(e);
        alert("Google login failed. Please try again.");
      }
    });

    // If already logged in, skip to home
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = "index.html";
    });
  </script>
</body>
</html>
